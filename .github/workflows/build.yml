name: Flutter Build

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          flutter-version: '3.38.9'
          cache: true
      - name: Install Dependencies
        run: flutter pub get
      - name: Run Build Runner
        run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Analyze
        run: flutter analyze
      - name: Run Tests
        run: flutter test

  build-android:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Update Android SDK
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_JKS_BASE64 }}" | base64 --decode > android/app/keystore.jks
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          flutter-version: '3.38.9'
          cache: true
      - name: Install Dependencies
        run: flutter pub get
      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --verbose
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    needs: analyze-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          flutter-version: '3.38.9'
          cache: true
      - name: Install Dependencies
        run: flutter pub get
      - name: Run Build Runner
        run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH
      - name: Build Windows and Installer
        run: dart run inno_build --release --verbose -- --no-tree-shake-icons
      - name: Zip Windows Build
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows-release.zip
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-zip
          path: windows-release.zip
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            build/windows/**/*.exe
            !build/windows/x64/runner/Release/**

  build-linux:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          flutter-version: '3.38.9'
          cache: true
      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop
      - name: Install Dependencies
        run: flutter pub get
      - name: Run Build Runner
        run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Build Linux
        run: flutter build linux --release --no-tree-shake-icons
      - name: Install Flatpak Builder
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder libstdc++-12-dev
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Import GPG Key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            # Configure GPG for headless environment
             mkdir -p ~/.gnupg
             chmod 700 ~/.gnupg
             
             # Attempt to set GPG_TTY, falling back if tty is not available
             export GPG_TTY=$(tty || echo "")
             
             # Use standard pinentry-mode loopback configuration
             echo "use-agent" > ~/.gnupg/gpg.conf
             echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
             
             # Configure agent to allow loopback AND set long cache TTL
             echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
             echo "default-cache-ttl 34560000" >> ~/.gnupg/gpg-agent.conf
             echo "max-cache-ttl 34560000" >> ~/.gnupg/gpg-agent.conf
             
             # Kill agent to ensure config is picked up
             gpgconf --kill gpg-agent
 
             # Import key
             echo "$GPG_PRIVATE_KEY" | gpg --batch --import
             
             # Set ultimate trust for the key using import-ownertrust (non-interactive)
             echo "E28C8DAF881F77322556C886B5549E0EA516EE25:6:" | gpg --import-ownertrust
             echo "GPG Trust imported successfully."
 
             # Install expect to handle pinentry interactively if needed
             sudo apt-get update && sudo apt-get install -y expect
 
             # Create an expect script to handle passphrase prompt
             # Use printf to avoid heredoc indentation issues in YAML
             printf 'spawn gpg --pinentry-mode loopback --sign test.txt\nexpect {\n    "Passphrase:" {\n        send "\\r"\n        exp_continue\n    }\n    eof\n}\n' > sign.exp
             
             # Test signing a dummy file to ensure GPG agent is ready and unlocked
             # This also primes the gpg-agent cache with the empty passphrase
             echo "test" > test.txt
             expect sign.exp
             echo "GPG Signing test passed."
             rm test.txt test.txt.gpg sign.exp
          else
            echo "No GPG private key provided, skipping import."
          fi
      - name: Build Flatpak
        run: |
          # 初始化 repo（如果不存在）
          mkdir -p repo
          if [ ! -d "repo/objects" ]; then
            ostree init --mode=archive-z2 --repo=repo
          fi
          # 添加 Flathub 远程源
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
          # 安装依赖并构建
          GPG_ARGS=""
          if gpg --list-keys "E28C8DAF881F77322556C886B5549E0EA516EE25" > /dev/null 2>&1; then
            GPG_ARGS="--gpg-sign=E28C8DAF881F77322556C886B5549E0EA516EE25 --gpg-homedir=$HOME/.gnupg"
            echo "Signing Flatpak with GPG Key: E28C8DAF881F77322556C886B5549E0EA516EE25"
          else
            echo "No GPG key found, skipping signing."
          fi
          
          # Pass GPG_TTY for pinentry
          export GPG_TTY=$(tty || echo "")
          
          # 构建 Flatpak (不带签名参数)
          flatpak-builder -v --user --install-deps-from=flathub --force-clean --repo=repo build-dir flatpak/org.essenmelia.Essenmelia.yml
          
          # 手动对 repo 进行 GPG 签名
          # 由于 flatpak-builder 的 GPGME 调用在 CI 环境下极不稳定，我们选择先构建后签名
          if [ -n "$GPG_PRIVATE_KEY" ]; then
             echo "Manually signing Flatpak repo..."
             # 获取最新的 commit ID
             COMMIT_ID=$(flatpak remote-ls --user --repo=repo --columns=commit org.essenmelia.Essenmelia | head -n 1)
             if [ -n "$COMMIT_ID" ]; then
                 # 使用 expect 脚本调用 ostree commit --gpg-sign 进行签名
                 printf 'spawn ostree commit --repo=repo --gpg-sign=E28C8DAF881F77322556C886B5549E0EA516EE25 --gpg-homedir=%s/.gnupg %s\nexpect {\n    "Passphrase:" {\n        send "\\r"\n        exp_continue\n    }\n    eof\n}\n' "$HOME" "$COMMIT_ID" > sign_repo.exp
                 expect sign_repo.exp
                 rm sign_repo.exp
                 echo "Manual signing completed."
             else
                 echo "Could not find commit ID to sign."
             fi
          fi
          
          # 打包
          flatpak build-bundle repo essenmelia.flatpak org.essenmelia.Essenmelia
      - name: Zip Linux Build
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../linux-release.zip .
      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-zip
          path: linux-release.zip
      - name: Upload Flatpak Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: essenmelia.flatpak

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: .
      - name: Download Windows Zip
        uses: actions/download-artifact@v4
        with:
          name: windows-release-zip
          path: .
      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: windows-installer-dir
      - name: Download Linux Zip
        uses: actions/download-artifact@v4
        with:
          name: linux-release-zip
          path: .
      - name: Download Linux Flatpak
        uses: actions/download-artifact@v4
        with:
          name: linux-flatpak
          path: .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.apk
            windows-release.zip
            linux-release.zip
            essenmelia.flatpak
            windows-installer-dir/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
