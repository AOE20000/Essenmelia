name: Flutter Build

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          flutter-version: '3.38.9'
          cache: true
      - name: Install Dependencies
        run: flutter pub get
      - name: Run Build Runner
        run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Analyze
        run: flutter analyze
      - name: Run Tests
        run: flutter test

  build-android:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Update Android SDK
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_JKS_BASE64 }}" | base64 --decode > android/app/keystore.jks
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          flutter-version: '3.38.9'
          cache: true
      - name: Install Dependencies
        run: flutter pub get
      - name: Run Build Runner
        run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --verbose
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/flutter-apk/app-release.apk

  build-windows:
    needs: analyze-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          flutter-version: '3.38.9'
          cache: true
      - name: Install Dependencies
        run: flutter pub get
      - name: Run Build Runner
        run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH
      - name: Build Windows and Installer
        run: dart run inno_build --release --verbose
      - name: Zip Windows Build
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows-release.zip
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-zip
          path: windows-release.zip
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            build/windows/**/*.exe
            !build/windows/x64/runner/Release/**

  build-linux:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          flutter-version: '3.38.9'
          cache: true
      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop
      - name: Install Dependencies
        run: flutter pub get
      - name: Run Build Runner
        run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Build Linux
        run: flutter build linux --release
      - name: Install Flatpak Builder
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder libstdc++-12-dev
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Import GPG Key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            # Configure GPG for headless environment
             mkdir -p ~/.gnupg
             chmod 700 ~/.gnupg
             
             # Attempt to set GPG_TTY, falling back if tty is not available
             export GPG_TTY=$(tty || echo "")
             
             # Use standard pinentry-mode loopback configuration
             echo "use-agent" > ~/.gnupg/gpg.conf
             echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
             
             # Configure agent to allow loopback AND preset passphrase
             echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
             echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
             
             # Restart agent to apply changes
             gpg-connect-agent reloadagent /bye
 
             # Import key
             echo "$GPG_PRIVATE_KEY" | gpg --batch --import
             
             # Set ultimate trust for the key using import-ownertrust (non-interactive)
             echo "E28C8DAF881F77322556C886B5549E0EA516EE25:6:" | gpg --import-ownertrust
             echo "GPG Trust imported successfully."
 
             # Preset passphrase (empty) for the key to avoid "No passphrase given" error
             # Get keygrips and loop through them (handle multiple subkeys)
             gpg --with-colons --list-secret-keys E28C8DAF881F77322556C886B5549E0EA516EE25 | grep grp | cut -d: -f10 | while read KEYGRIP; do
                if [ -n "$KEYGRIP" ]; then
                   echo "Presetting passphrase for keygrip: $KEYGRIP"
                   # Use echo -n to pipe empty string
                   echo -n "" | /usr/lib/gnupg/gpg-preset-passphrase --preset "$KEYGRIP"
                fi
             done

             # Test signing a dummy file to ensure GPG agent is ready and unlocked
             echo "test" > test.txt
             gpg --batch --yes --pinentry-mode loopback --sign test.txt
             echo "GPG Signing test passed."
             rm test.txt test.txt.gpg
          else
            echo "No GPG private key provided, skipping import."
          fi
      - name: Build Flatpak
        run: |
          # 初始化 repo（如果不存在）
          mkdir -p repo
          if [ ! -d "repo/objects" ]; then
            ostree init --mode=archive-z2 --repo=repo
          fi
          # 添加 Flathub 远程源
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
          # 安装依赖并构建
          GPG_ARGS=""
          if gpg --list-keys "E28C8DAF881F77322556C886B5549E0EA516EE25" > /dev/null 2>&1; then
            GPG_ARGS="--gpg-sign=E28C8DAF881F77322556C886B5549E0EA516EE25 --gpg-homedir=$HOME/.gnupg"
            echo "Signing Flatpak with GPG Key: E28C8DAF881F77322556C886B5549E0EA516EE25"
          else
            echo "No GPG key found, skipping signing."
          fi
          
          # Pass GPG_TTY for pinentry
          export GPG_TTY=$(tty || echo "")
          
          # 构建 Flatpak
          flatpak-builder -v --user --install-deps-from=flathub --force-clean --repo=repo $GPG_ARGS build-dir flatpak/org.essenmelia.Essenmelia.yml
          # 打包
          flatpak build-bundle repo essenmelia.flatpak org.essenmelia.Essenmelia
      - name: Zip Linux Build
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../linux-release.zip .
      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-zip
          path: linux-release.zip
      - name: Upload Flatpak Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: essenmelia.flatpak

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: .
      - name: Download Windows Zip
        uses: actions/download-artifact@v4
        with:
          name: windows-release-zip
          path: .
      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: windows-installer-dir
      - name: Download Linux Zip
        uses: actions/download-artifact@v4
        with:
          name: linux-release-zip
          path: .
      - name: Download Linux Flatpak
        uses: actions/download-artifact@v4
        with:
          name: linux-flatpak
          path: .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.apk
            windows-release.zip
            linux-release.zip
            essenmelia.flatpak
            windows-installer-dir/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
